<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRUD Moderno</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1>Gestor de tareas</h1>
        <p>CRUD intuitivo y responsive para agregar, editar y eliminar.</p>
      </header>

      <section class="panel form-panel">
        <h2 id="form-title">Agregar tarea</h2>
        <form id="task-form" autocomplete="off">
          <input type="hidden" id="task-id" />

          <label for="task-title">Título</label>
          <input
            id="task-title"
            name="title"
            type="text"
            placeholder="Ej: Estudiar estructuras de datos"
            required
            maxlength="70"
          />

          <label for="task-description">Descripción</label>
          <textarea
            id="task-description"
            name="description"
            placeholder="Escribe una descripción breve..."
            rows="4"
            maxlength="180"
            required
          ></textarea>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="submit-btn">Guardar</button>
            <button type="button" class="btn btn-secondary hidden" id="cancel-btn">Cancelar edición</button>
          </div>
        </form>
      </section>

      <section class="panel list-panel">
        <div class="list-header">
          <h2>Listado</h2>
          <input id="search" type="search" placeholder="Buscar por título..." />
        </div>
        <ul id="task-list" class="task-list"></ul>
        <p id="empty-state" class="empty-state">No hay tareas aún. ¡Agrega la primera!</p>
      </section>
    </main>

    <template id="task-template">
      <li class="task-item">
        <article>
          <h3 class="task-item__title"></h3>
          <p class="task-item__description"></p>
        </article>
        <div class="task-item__actions">
          <button class="btn btn-edit" data-action="edit">Editar</button>
          <button class="btn btn-delete" data-action="delete">Eliminar</button>
        </div>
      </li>
    </template>

    <script src="app.js"></script>
  </body>
</html>
